services:
  db:
    image: mariadb:10.11
    container_name: centralized_log_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-logs}
      MYSQL_USER: ${DB_USER:-logs}
      MYSQL_PASSWORD: ${DB_PASSWORD:-logs}
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  api_collector:
    build:
      context: ./api_collector
      dockerfile: Dockerfile
    container_name: centralized_log_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-logs}
      - DB_USER=${DB_USER:-logs}
      - DB_PASSWORD=${DB_PASSWORD:-logs}
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - app-network

  alerting_worker:
    build:
      context: ./alerting_worker
      dockerfile: Dockerfile
    container_name: centralized_log_worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-logs}
      - DB_USER=${DB_USER:-logs}
      - DB_PASSWORD=${DB_PASSWORD:-logs}
      - SMTP_HOST=${SMTP_HOST:-smtp.example.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-user@example.com}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-password}
      - ALERT_RECIPIENT=${ALERT_RECIPIENT:-ops@example.com}
      - POLL_INTERVAL=${POLL_INTERVAL:-10}
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    #   - PYTHONPATH=/app     
    # command: python -u -m src.worker_controller
    networks:
      - app-network

volumes:
  db-data:
    driver: local

networks:
  app-network:
    driver: bridge
